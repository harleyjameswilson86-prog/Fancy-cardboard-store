<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Fancy Cardboard Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="main-header">
<div class="header-left">
<span class="hamburger" onclick="toggleMenu()">☰</span>
<div class="logo"><span>Fancy</span> <span>Cardboard</span> <span class="store">Store</span></div>
</div>
<div class="header-right">
<span class="cart-icon">Cart</span>
</div>
</header>
<div class="search-bar">
<input type="text" placeholder="Search for Pokémon, One Piece, Magic cards...">
</div>
<nav class="mobile-nav" id="mobileNav">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
<main class="contact">
<h1>Contact Us</h1>
<div class="content">
<p>Have a question or want to make an offer? Get in touch.</p>
<form class="contact-form">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Message" rows="5" required></textarea>
<button type="submit" class="btn">Send Message</button>
</form>
<div class="contact-info">
<p><strong>Email:</strong> hello@fancycardboardstore.com</p>
<p><strong>Location:</strong> Gold Coast, Australia</p>
</div>
</div>
</main>
<footer>
<p>&copy; 2026 Fancy Cardboard Store. All rights reserved.</p>
</footer>
<script>
function toggleMenu() {
  document.getElementById('mobileNav').classList.toggle('active');
}
</script>
</body>
</html>
