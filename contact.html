<main class="contact">
<h1>Contact Us</h1>
<div class="content">
<p>Have a question or want to make an offer? Get in touch.</p>
<form class="contact-form" action="https://formspree.io/f/xreyrzbn" method="POST">

<textarea name="message" placeholder="Message" rows="5" required></textarea>
<button type="submit" class="btn">Send Message</button>
</form>
<div class="contact-info">
<p><strong>Email:</strong> hello@fancycardboardstore.com</p>
<p><strong>Location:</strong> Gold Coast, Australia</p>
</div>
